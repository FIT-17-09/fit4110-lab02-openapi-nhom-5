openapi: 3.1.0
info:
  title: Sample API (template)
  version: 1.0.0
  description: >-
    Template OpenAPI for Lab 02. Replace with pair-specific API.
paths:
  /items:
    get:
      operationId: listItems
      summary: List items
      description: Returns a list of items.
      tags: [Items]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemList'
  /items/{id}:
    get:
      operationId: getItem
      summary: Get item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Not Found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /items:
    post:
      operationId: createItem
      summary: Create an item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewItem'
      responses:
        '201':
          description: Created
  /search:
    get:
      operationId: searchItems
      summary: Search
      responses:
        '200':
          description: OK

components:
  schemas:
    Item:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: [string, "null"]
      required: [id, name]
    ItemList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Item'
    NewItem:
      type: object
      properties:
        name:
          type: string
    Problem:
      $ref: 'https://tools.ietf.org/html/rfc7807'
    SearchResult:
      oneOf:
        - $ref: '#/components/schemas/Item'
        - type: object
          properties:
            message:
              type: string
      discriminator:
        propertyName: objectType
